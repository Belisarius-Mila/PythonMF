<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MMTX Web</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-card">
        <div class="story-stage" id="storyStage">
          <img class="story-image" id="sceneImage" src="intro1.png" alt="Benziho pribeh">
          <div class="stage-vignette"></div>
          <div class="brand-badge">MMTX</div>
          <button class="magnifier-button hidden" id="magnifierButton" type="button" aria-label="Lupa">
            <span class="magnifier-icon">🔍</span>
          </button>
          <div class="caption-panel" id="captionPanel">
            <h2 class="caption-title" id="captionTitle">Benziho domek</h2>
            <p class="caption-text" id="captionText">Klikni kamkoli nebo pockej chvilku.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
