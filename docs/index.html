<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MMTX Web</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="styles_intro_v2.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-card">
        <div class="story-stage" id="storyStage">
          <img class="story-image" id="sceneImage" src="intro1.png?v=20260402b" alt="Benziho pribeh">
          <div class="stage-vignette"></div>
          <img class="click-prompt" id="clickPrompt" src="ClickMAT.PNG?v=20260402b" alt="Klikni">
          <button class="magnifier-button hidden" id="magnifierButton" type="button" aria-label="Lupa">
            <span class="magnifier-icon">🔍</span>
          </button>
          <button class="mushroom-portal hidden" id="mushroomPortalButton" type="button" aria-label="Houby a barvy">
            <span class="mushroom-portal-icon">🍄</span>
            <span class="mushroom-portal-dots">
              <span class="portal-dot portal-red"></span>
              <span class="portal-dot portal-blue"></span>
              <span class="portal-dot portal-green"></span>
              <span class="portal-dot portal-orange"></span>
            </span>
          </button>
          <div class="mushroom-hud hidden" id="mushroomHud">
            <button class="hud-button" id="backToSignpostButton" type="button" aria-label="Zpet">↩</button>
            <button class="hud-button active" id="colorsModeButton" type="button" aria-label="Barvy">🎨</button>
            <button class="hud-button" id="numbersModeButton" type="button" aria-label="Cisla">123</button>
          </div>
          <div class="scene-overlay hidden" id="mushroomOverlay"></div>
        </div>
      </section>
    </main>

    <script src="script_intro_v2.js"></script>
  </body>
</html>
