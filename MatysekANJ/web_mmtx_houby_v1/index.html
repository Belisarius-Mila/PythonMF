<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MMTX Web</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <button class="ui-button" id="repeatButton" type="button">Znovu</button>
        </div>
        <div class="title-card">
          <h1 id="sceneTitle">MMTX - Barevne houby</h1>
        </div>
        <div class="topbar-right">
          <button class="mode-button active" id="colorsMode" type="button">Barvy</button>
          <button class="mode-button" id="numbersMode" type="button">Cisla</button>
        </div>
      </header>

      <section class="scene-card">
        <div class="scene" id="scene">
          <img class="scene-image" src="scene.jpg" alt="Lesni scena s houbami a pejskem">
          <div class="scene-overlay" id="overlay"></div>
          <div class="speech-bubble hidden" id="speechBubble"></div>
        </div>
      </section>

      <footer class="bottom-panel">
        <p class="bottom-title" id="bottomTitle">Klikni na houbu a ozve se barva.</p>
        <p class="bottom-subtitle" id="bottomSubtitle">Cil: Red, Blue, Green, Orange</p>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
