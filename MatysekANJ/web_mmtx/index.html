<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MMTX Web</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="styles_intro_v2.css?v=20260410f">
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-card">
        <div class="story-stage" id="storyStage">
          <img class="story-image" id="sceneImage" src="intro1.png?v=20260402b" alt="Benziho pribeh">
          <div class="stage-vignette"></div>
          <img class="click-prompt" id="clickPrompt" src="ClickMAT.PNG?v=20260402b" alt="Klikni">
          <button class="magnifier-button hidden" id="magnifierButton" type="button" aria-label="Lupa">
            <span class="magnifier-icon">🔍</span>
          </button>
          <button class="mushroom-portal hidden" id="mushroomPortalButton" type="button" aria-label="Houby a barvy">
            <span class="mushroom-portal-icon">🍄</span>
            <span class="mushroom-portal-dots">
              <span class="portal-dot portal-red"></span>
              <span class="portal-dot portal-blue"></span>
              <span class="portal-dot portal-green"></span>
              <span class="portal-dot portal-orange"></span>
            </span>
          </button>
          <button class="bunny-portal hidden" id="bunnyPortalButton" type="button" aria-label="Benji a Bunny">
            <span class="bunny-portal-icon">🐰</span>
            <span class="bunny-portal-label">Friends</span>
          </button>
          <div class="mushroom-hud hidden" id="mushroomHud">
            <button class="hud-button" id="backToSignpostButton" type="button" aria-label="Zpet">↩</button>
            <button class="hud-button" id="mushroomHelpButton" type="button" aria-label="Napoveda">🔊</button>
            <button class="hud-button active" id="colorsModeButton" type="button" aria-label="Barvy">🎨</button>
            <button class="hud-button" id="numbersModeButton" type="button" aria-label="Cisla">123</button>
          </div>
          <div class="dialogue-hud hidden" id="dialogueHud">
            <button class="hud-button" id="backFromDialogueButton" type="button" aria-label="Zpet">↩</button>
            <button class="hud-button pulse-soft" id="dialogueHelpButton" type="button" aria-label="Napoveda">🎤</button>
          </div>
          <div class="owl-garden-hud hidden" id="owlGardenHud">
            <button class="hud-button" id="backFromOwlGardenButton" type="button" aria-label="Zpet">↩</button>
            <button class="hud-button pulse-soft" id="owlGardenHelpButton" type="button" aria-label="Napoveda">🎤</button>
          </div>
          <div class="scene-overlay hidden" id="mushroomOverlay"></div>
          <div class="dialogue-panel hidden" id="dialoguePanel"></div>
          <div class="owl-garden-overlay hidden" id="owlGardenOverlay"></div>
          <div class="owl-garden-prompt hidden" id="owlGardenPrompt" aria-hidden="true"></div>
          <button class="owl-garden-thumb hidden" id="owlGardenThumbButton" type="button" aria-label="Palec nahoru">
            👍
          </button>
          <button class="dialogue-door hidden" id="dialogueDoorButton" type="button" aria-label="Dvere">
            <span class="dialogue-door-icon">🚪</span>
          </button>
          <div class="owl-garden-done hidden" id="owlGardenDoneBadge" aria-hidden="true">✓</div>
        </div>
      </section>
    </main>

    <script src="script_intro_v2.js?v=20260410c"></script>
  </body>
</html>
